# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo

# Site
title: 小麒资源汇总站
subtitle: ''
description: ''
keywords:
author: John Doe
language: zh-CN
timezone: ''

# URL
url: http://example.com
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true
  trailing_html: true

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:
  - live2d-widget-model-koharu/**/*
  - live2d/**/*

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Metadata elements
meta_generator: true

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: 'mtime'

# Pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
include:
exclude:
ignore:

# Extensions
theme: butterfly

# Deployment
deploy:
  type: ''

search:
  path: search.xml
  field: post
  content: true
  template: template

# ========== 看板娘配置（终极生效版） ==========
inject:
  bottom:
    - |
      <script>
        // 第一步：强制清除Live2D模型缓存（核心！）
        localStorage.removeItem('L2Dwidget:model:loaded');
        sessionStorage.removeItem('L2Dwidget:model:json');
        
        // 第二步：动态加载核心库（避免缓存）
        (function loadLive2D() {
          const script = document.createElement('script');
          // 加随机参数，避免JS缓存
          script.src = 'https://cdn.staticfile.org/live2d-widget/3.0.4/L2Dwidget.min.js?v=' + Math.random();
          script.onload = initLive2D;
          document.body.appendChild(script);
        })();

        // 第三步：初始化看板娘（初音模型+强制交互）
        function initLive2D() {
          L2Dwidget.init({
            model: { 
              // 加随机参数，避免模型缓存
              jsonPath: 'https://cdn.staticfile.org/live2d-widget-model-miku/1.0.5/assets/miku.model.json?v=' + Math.random()
            },
            display: { 
              position: 'left', 
              width: 150, 
              height: 300,
              hOffset: 20, 
              vOffset: 20
            },
            mobile: { show: true },
            react: {
              opacityDefault: 0.9,
              opacityOnHover: 1.0,
              scale: 1.05 // 悬浮放大，强化交互反馈
            },
            dialog: {
              enable: true,
              hitokoto: true,
              // 强制显示对话框样式
              style: {
                fontSize: '14px',
                color: '#333',
                backgroundColor: 'rgba(255,255,255,0.8)',
                border: '1px solid #eee',
                borderRadius: '8px',
                padding: '8px 12px',
                opacity: 1 // 默认显示
              }
            }
          });

          // 第四步：手动绑定交互（100%生效）
          setTimeout(() => {
            const live2dElem = document.querySelector('.live2d-widget');
            if (live2dElem) {
              // 点击事件
              live2dElem.onclick = function() {
                const texts = ['你好呀 😊', '要看看我的新衣服吗？', '不要一直点我啦～', '今天也要加油哦！', '欢迎来到我的博客～'];
                const randomText = texts[Math.floor(Math.random() * texts.length)];
                
                // 强制创建/显示对话框
                let dialog = document.querySelector('.live2d-widget-dialog');
                if (!dialog) {
                  // 没有对话框就手动创建
                  dialog = document.createElement('div');
                  dialog.className = 'live2d-widget-dialog';
                  dialog.style.position = 'absolute';
                  dialog.style.left = '160px';
                  dialog.style.top = '100px';
                  dialog.style.zIndex = '9999';
                  dialog.style.fontSize = '14px';
                  dialog.style.color = '#333';
                  dialog.style.backgroundColor = 'rgba(255,255,255,0.8)';
                  dialog.style.border = '1px solid #eee';
                  dialog.style.borderRadius = '8px';
                  dialog.style.padding = '8px 12px';
                  live2dElem.appendChild(dialog);
                }
                dialog.textContent = randomText;
                dialog.style.opacity = 1;
                setTimeout(() => { dialog.style.opacity = 0; }, 3000);
              };

              // 悬浮事件
              live2dElem.onmouseover = function() {
                this.style.transform = 'scale(1.05)';
                this.style.transition = 'transform 0.3s ease';
                // 触发模型动作
                if (window.Live2DModel) {
                  window.Live2DModel.motion('tap_body');
                }
              };
              live2dElem.onmouseout = function() {
                this.style.transform = 'scale(1)';
              };
            }
          }, 1000);
        }
      </script>