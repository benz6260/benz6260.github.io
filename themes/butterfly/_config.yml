# Hexo Theme Butterfly
# https://github.com/jerryc127/hexo-theme-butterfly

# Menu
menu:
  home: / || home
  archives: /archives/ || archive
  categories: /categories/ || th
  tags: /tags/ || tags
  about: /about/ || user

# Site
title: Hexo Blog
subtitle: ''
description: ''
keywords: ''
author: Your Name
language: zh-CN
timezone: ''

# Favicon
favicon: /favicon.ico

# Logo
logo: /img/logo.png

# Theme Color
theme_color:
  primary: '#3498db'
  accent: '#2ecc71'

# Sidebar
sidebar:
  position: right
  display: always

# TOC
toc:
  enable: true
  number: true
  expand_all: false
  init_open: true

# Code
code:
  copy: true
  collapse: false
  collapse_text: 展开代码

# Pagination
pagination:
  per_page: 10
  per_page_tag: 10
  per_page_category: 10

# Social
social:
  GitHub: https://github.com/username || github
  Twitter: https://twitter.com/username || twitter

# Analytics
google_analytics: ''
baidu_analytics: ''

# Copyright
copyright:
  enable: true
  limit_count: 150
  author: Your Name
  license: CC BY-NC-SA 4.0

# Back To Top
back_to_top:
  enable: true
  scroll_distance: 300

# Reading Progress
reading_progress:
  enable: true
  height: 3px
  color: '#3498db'
  reversed: false

# Image
image:
  lazyload: true
  zoom: true

# Math
math:
  enable: false
mathjax:
  enable: true
  version: '2.7.8'
katex:
  enable: false
  version: '0.12.0'

# Comment
comment:
  valine:
    enable: false
    app_id: ''
    app_key: ''
    placeholder: '请输入评论内容'
    avatar: 'retro'
    verify: false
    notify: false
    recordIP: false
    order: 'latest'
  gitalk:
    enable: false
    client_id: ''
    client_secret: ''
    repo: ''
    owner: ''
    admin: ['']
    language: 'zh-CN'
  disqus:
    enable: false
    shortname: ''

# Share
share:
  enable: true
  platforms:
    - facebook
    - twitter
    - weibo
    - qq
    - qzone
    - douban

# RSS
rss: /atom.xml

# Sitemap
sitemap:
  path: sitemap.xml
  template: sitemap.ejs

# 404 Page
page_404:
  enable: true
  background: /img/404.jpg

# PWA
pwa:
  enable: false
  manifest: /manifest.json
  sw: /sw.js

# Custom
custom_css: /css/custom.css
custom_js: /js/custom.js

# Avatar
avatar:
  img: /img/avatar.jpg
  rounded: true
  animation: false

# Busuanzi
statistics:
  enable: true
busuanzi:
  enable: true
  site_uv: true
  site_pv: true
  page_pv: true
